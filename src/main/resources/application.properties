# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.ma.vivalis.BKAM_CDR_API1=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n


# ===============================
# Memory
# ===============================
#spring.jvm.max-memory=2048m


# ===============================
# Memory & Performance
# ===============================
# Increase JVM memory for large volumes
spring.jvm.max-memory=4096m
# Free memory after each transaction
spring.jpa.properties.hibernate.jdbc.fetch_size=50
# Disable second level cache to save memory
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
# Free resources after each batch
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===============================
# Connection Pool & Timeout - CRITICAL FOR LONG PROCESSES
# ===============================
# Maximum connection lifetime (2 hours = 7200000 ms)
spring.datasource.hikari.max-lifetime=7200000
# Connection timeout (30 seconds)
#spring.datasource.hikari.connection-timeout=30000
# Idle timeout (30 minutes)
#spring.datasource.hikari.idle-timeout=1800000
# Keep connections alive every 5 minutes
spring.datasource.hikari.keepalive-time=300000
# Max pool size
#spring.datasource.hikari.maximum-pool-size=10
# Min idle connections
#spring.datasource.hikari.minimum-idle=5
# Validation query to keep connection alive
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL


#debug=true
logging.level.org.springframework=DEBUG
logging.level.org.hibernate=DEBUG



# ???????????????????????????????????????????????????????
# THREAD POOLS
# ???????????????????????????????????????????????????????

# batchTaskExecutor ? chunks parallèles dans chaque Step
batch.thread.chunk.core-size=4
batch.thread.chunk.max-size=8
batch.thread.chunk.queue-capacity=50

# flowTaskExecutor ? entités parallèles entre Steps
batch.thread.flow.core-size=3
batch.thread.flow.max-size=5

# ???????????????????????????????????????????????????????
# HIKARI ? CRUCIAL : supporter les 2 niveaux de //
# ???????????????????????????????????????????????????????
# Calcul : (flow.core × chunk.core) + marge = (3 × 4) + 8 = 20
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000










# ?????????????????????????????????????????????????
# SPRING BATCH
# ???????????????????????????????????????????????
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=true

# ???????????????????????????????????????????????
# OUTPUT
# ???????????????????????????????????????????????
batch.output.dir=output/
batch.output.client.file=clients_cdr.xml
batch.output.info.file=infoNegatives_cdr.xml
batch.output.clientPer.file=clients_per_cdr.xml
batch.output.garantie.file=garantie_cdr.xml
batch.output.contratPer.file=contrats_per_cdr.xml
batch.output.contrat.file=contrats_cdr.xml

debug=false
logging.level.org.springframework.boot.autoconfigure=ERROR
logging.level.org.springframework.batch=INFO
logging.level.ma.vivalis=DEBUG

